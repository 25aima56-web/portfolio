<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Events</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#adminPanel { display: none; }

input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #ff4b2b;
  color: white;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Elite Events 🎉</h1>

<!-- BOOKING FORM -->
<h2>Book Your Event</h2>
<input type="text" id="name" placeholder="Your Name"><br>
<input type="date" id="date"><br>

<select id="type">
  <option>Wedding</option>
  <option>Birthday</option>
  <option>Corporate</option>
</select><br>

<button onclick="submitForm()">Submit</button>
<p id="response"></p>

<hr>

<!-- LOGIN -->
<div id="login">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h2>📊 Admin Dashboard</h2>
  <button onclick="logout()">Logout</button>
  <div id="bookings"></div>
</div>

<!-- 🔥 FIREBASE (FIXED VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// ✅ YOUR CONFIG (already added)
const firebaseConfig = {
  apiKey: "AIzaSyBG2uZHOD_SKBrFyxz1d8hDZ1tR2jPZUZ0",
  authDomain: "aima56.firebaseapp.com",
  projectId: "aima56",
  storageBucket: "aima56.firebasestorage.app",
  messagingSenderId: "761706018777",
  appId: "1:761706018777:web:dd19f7306d99ed6ba78bc8",
  measurementId: "G-RH91QRRL22"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🔥 BOOKING FUNCTION
function submitForm() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const type = document.getElementById("type").value;

  if (!name || !date) {
    document.getElementById("response").innerText =
      "⚠️ Fill all details!";
    return;
  }

  db.collection("bookings").add({
    name: name,
    date: date,
    type: type,
    createdAt: new Date()
  })
  .then(() => {
    document.getElementById("response").innerText =
      "🔥 Booking saved!";
  })
  .catch((error) => {
    document.getElementById("response").innerText =
      "❌ Error: " + error.message;
  });
  .function submitform(){
    alert("form submitted!");
  } 
}

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      loadBookings();
    })
    .catch(err => alert(err.message));
}

// 🚪 LOGOUT

// 📊 LOAD BOOKINGS
function loadBookings() {
  db.collection("bookings").get().then(snapshot => {
    const container = document.getElementById("bookings");
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.classList.add("card");

      div.innerHTML = `
        <p><b>Name:</b> ${data.name}</p>
        <p><b>Date:</b> ${data.date}</p>
        <p><b>Type:</b> ${data.type}</p>
        <button onclick="deleteBooking('${doc.id}')">Delete</button>
      `;

      container.appendChild(div);
    });
  });
}

// ❌ DELETE
function deleteBooking(id) {
  db.collection("bookings").doc(id).delete()
    .then(() => {
      alert("Deleted!");
      loadBookings();
    });
}
</script>

</body>
</html>
